# Build + publish the Pythia container image to GitHub Container Registry (ghcr.io).
# Fires on a release tag (or manual dispatch). Uses the workflow's AUTOMATIC
# GITHUB_TOKEN — no user PAT, nothing to expire.
# Adapted from Mnemosyne's .github/workflows/image.yml.

name: Publish Pythia image (ghcr.io)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build & push ghcr image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Buildx is REQUIRED for the type=gha build cache below — without it
      # docker/build-push-action fails instantly (the default docker driver can't
      # export/import a gha cache).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ancientpantheon/pythia
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
