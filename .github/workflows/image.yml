# Build + publish the Pythia container image to GitHub Container Registry (ghcr.io).
# Fires on a release tag (or manual dispatch). Uses the workflow's AUTOMATIC
# GITHUB_TOKEN — no user PAT, nothing to expire.
# Adapted from Mnemosyne's .github/workflows/image.yml.

name: Publish Pythia image (ghcr.io)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Build & push ghcr image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # ── Version gate ────────────────────────────────────────────────────────
      # Hold the ghcr push to the SAME unified-version guarantee as the npm
      # publish (publish.yml): a version-file drift (e.g. a forgotten
      # apps/pythia/src/version.ts bump) must block the container too, so we
      # never ship an image whose baked-in /healthz + footer version lies.
      # Reuses the real gate (apps/pythia/src/versionConsistency.test.ts) via
      # `npm test` instead of duplicating the rule here.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify tag matches the unified version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          TAG_VERSION="${TAG_REF#refs/tags/v}"
          UNIFIED_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$UNIFIED_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match the unified version $UNIFIED_VERSION — refusing to push a mistagged image."
            exit 1
          fi
      - name: Version-consistency + test gate
        run: npm test

      # Buildx is REQUIRED for the type=gha build cache below — without it
      # docker/build-push-action fails instantly (the default docker driver can't
      # export/import a gha cache).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/ancientpantheon/pythia
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
